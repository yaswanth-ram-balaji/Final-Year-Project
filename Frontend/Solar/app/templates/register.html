                    </div>
                    <div class="col-md-7">
                        <div class="contact-form">
                            <div id="success"></div>
                            <form action="{% url 'register' %}" method="post">
                                {% csrf_token %}
                                <div class="control-group">
                                    <input type="text" class="form-control" name="name" placeholder="Your Name" required="required" data-validation-required-message="Please enter your name" />
                                    <p class="help-block text-danger"></p>
                                </div>
                                <div class="control-group">
                                    <input type="email" class="form-control" name="email" placeholder="Your Email" required="required" data-validation-required-message="Please enter your email" />
                                    <p class="help-block text-danger"></p>
                                </div>
                                <div class="control-group">
                                    <input type="password" class="form-control" name="password" placeholder="Enter password" required="required" data-validation-required-message="Please enter a password" />
                                    <p class="help-block text-danger"></p>
                                </div>
                                <div class="control-group">
                                    <input type="password" class="form-control" name="confirm_password" placeholder="Enter confirm_password" required="required" data-validation-required-message="Please enter a confirm password" />
                                    <p class="help-block text-danger"></p>
                                </div>
                                <div class="control-group">
                                    <textarea class="form-control" name="address" placeholder="Address" required="required" data-validation-required-message="Please enter your address"></textarea>
                                    <p class="help-block text-danger"></p>
                                </div>
                                <div>
                                    <button class="btn btn-custom" type="submit" >Submit</button>
                                </div>
                            </form>
                        </div>
                    </div>
