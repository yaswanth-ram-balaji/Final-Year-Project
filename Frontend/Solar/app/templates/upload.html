<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Solar Panel</title>
        <meta content="width=device-width, initial-scale=1.0" name="viewport">

        <!-- Favicon -->
        <link href="/static/img/favicon.ico" rel="icon">

        <!-- Google Font -->
        <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"> 
        
        <style>
            .card {
              background: #ffffffcc;
              border-radius: 12px;
            }
          
            .form-control-file {
              padding: 10px;
              border: 1px solid #ced4da;
              border-radius: 6px;
            }
          
            .btn-primary {
              padding: 10px 30px;
              font-weight: 600;
            }
        </style>

        <!-- CSS Libraries -->
        <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
        <link href="/static/lib/flaticon/font/flaticon.css" rel="stylesheet">
        <link href="/static/lib/animate/animate.min.css" rel="stylesheet">
        <link href="/static/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

        <!-- Template Stylesheet -->
        <link href="/static/css/style.css" rel="stylesheet">
    </head>

    <body>
        <!-- Nav Bar Start -->
        <div class="nav-bar">
            <div class="container">
                <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
                    <a href="#" class="navbar-brand">MENU</a>
                    <button type="button" class="navbar-toggler" data-toggle="collapse" data-target="#navbarCollapse">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                        <div class="navbar-nav mr-auto">
                            <a href="{% url 'home' %}" class="nav-item nav-link">Home</a>
                            <a href="{% url 'about' %}" class="nav-item nav-link">About</a>
                            <a href="{% url 'upload' %}" class="nav-item nav-link active">Upload</a>
                            <a href="{% url 'index' %}" class="nav-item nav-link">Logout</a>
                        </div>
                    </div>
                </nav>
            </div>
        </div>
        <!-- Nav Bar End -->
        
        
        <!-- Page Header Start -->
        <div class="page-header">
            <div class="container">
                <div class="row">
                    <div class="col-12">
                        <h2>Upload Page</h2>
                    </div>
                    <div class="col-12">
                        <a href="{% url 'home' %}">Home</a>
                        <a href="{% url 'upload' %}">Upload</a>
                    </div>
                </div>
            </div>
        </div>
        <!-- Page Header End -->
        
        <div class="about">
            <div class="container">
              <div class="row justify-content-center mt-5">
                <div class="col-md-6">
                  <div class="card shadow-sm p-4 border-0">
                    <h3 class="text-center mb-4">Upload Your File</h3>

                    <!-- Upload Form -->
                    <form action="{% url 'upload' %}" method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="form-group">
                            <label for="fileUpload">Choose a file</label>
                            <input type="file" class="form-control-file" id="fileUpload" name="uploaded_file" required>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary mt-3">Upload</button>
                        </div>
                    </form>

                  </div>
                </div>
              </div>
            </div>
        </div>

        {% if annotated_image %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">

            {% if classification == "normal" %}
                <h4 style="color:green; font-weight:bold;">
                    Predicted Class: {{ classification }}
                </h4>
            {% else %}
                <h4 style="color:red; font-weight:bold;">
                    Predicted Class: {{ classification }}
                </h4>
            {% endif %}

            <div class="card shadow-sm p-3 mt-3">
                <img src="{{ annotated_image }}" class="img-fluid result-image">
            </div>

        </div>
    </div>
</div>
{% endif %}

        <!-- JavaScript Libraries -->
        <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"></script>
        <script src="lib/easing/easing.min.js"></script>
        <script src="lib/owlcarousel/owl.carousel.min.js"></script>
        <script src="lib/waypoints/waypoints.min.js"></script>
        <script src="lib/counterup/counterup.min.js"></script>

        <!-- Template Javascript -->
        <script src="js/main.js"></script>
    </body>
</html>
